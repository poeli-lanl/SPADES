name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'

env:
  DOCKER_IMAGE: poeli/spades-g2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract Docker tags
      id: version
      env:
        RELEASE_NAME: ${{ github.event.release.name }}
        RELEASE_TAG: ${{ github.event.release.tag_name }}
        DISPATCH_TAG: ${{ github.event.inputs.tag }}
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          RAW_VERSION="${RELEASE_NAME:-$RELEASE_TAG}"
          VERSION=$(printf '%s' "$RAW_VERSION" | sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//' | cut -c1-128)
          if [ -z "$VERSION" ]; then
            VERSION=$(printf '%s' "$RELEASE_TAG" | sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//' | cut -c1-128)
          fi
          if [ -z "$VERSION" ]; then
            echo "Unable to derive a Docker tag from the release name or tag." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${{ env.DOCKER_IMAGE }}:${VERSION},${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
        else
          VERSION="${DISPATCH_TAG}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${{ env.DOCKER_IMAGE }}:${VERSION}" >> $GITHUB_OUTPUT
        fi
    
    - name: Build and push Docker image (AMD64)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.version.outputs.tags }}
        labels: |
          org.opencontainers.image.title=SPADES-G2
          org.opencontainers.image.description=Sequence-based Pathogen-Agnostic Diagnostics/Detection Solution
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.event.repository.updated_at }}
        cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
        cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max
    
    - name: Test Docker image
      run: |
        docker run --rm ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }} ./scripts/check_install.sh
